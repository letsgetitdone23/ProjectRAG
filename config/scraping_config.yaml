# Scraping Configuration for Mutual Fund FAQ Assistant

# General settings
general:
  output_directory: "data/raw"
  log_level: "INFO"
  max_retries: 3
  timeout_seconds: 30
  concurrent_requests: 5

# URL management
url_management:
  validate_urls_before_scraping: true
  cache_validation_results: true
  validation_cache_ttl: 3600  # 1 hour
  
# Rate limiting by domain
rate_limiting:
  groww.in:
    delay_seconds: 2.0
    max_requests_per_minute: 30
  nipponindiaim.com:
    delay_seconds: 1.5
    max_requests_per_minute: 40
  sebi.gov.in:
    delay_seconds: 3.0
    max_requests_per_minute: 20
  amfiindia.com:
    delay_seconds: 2.5
    max_requests_per_minute: 25

# Content extraction settings
content_extraction:
  html:
    remove_selectors:
      - "nav"
      - "header" 
      - "footer"
      - "aside"
      - ".navigation"
      - ".menu"
      - ".ads"
      - ".advertisement"
      - ".cookie-banner"
      - ".popup"
      - ".modal"
      - "script"
      - "style"
      - "noscript"
    
    preserve_selectors:
      - "main"
      - "article"
      - ".content"
      - ".main-content"
      - "h1"
      - "h2"
      - "h3"
      - "h4"
      - "h5"
      - "h6"
      - "p"
      - "table"
      - "ul"
      - "ol"
      - "li"
  
  pdf:
    extraction_methods:
      - "pdfplumber"  # Primary method
      - "pypdf2"      # Fallback method
    
    table_extraction:
      preserve_formatting: true
      min_rows: 2
      min_columns: 2

# Data processing settings
data_processing:
  text_cleaning:
    normalize_whitespace: true
    remove_special_characters: true
    expand_abbreviations: true
    normalize_numbers: true
    normalize_dates: true
  
  content_validation:
    check_advisory_content: true
    required_fields:
      - "expense_ratio"
      - "nav"
      - "fund_name"
    min_content_length: 100
    max_content_length: 50000
  
  duplicate_detection:
    enabled: true
    similarity_threshold: 0.95
    hash_method: "md5"
  
  change_detection:
    enabled: true
    track_content_changes: true
    track_metadata_changes: true

# Source-specific handlers
source_handlers:
  amc_official:
    extract_fund_manager: true
    extract_performance_data: true
    extract_portfolio_holdings: true
    extract_expense_information: true
    
  groww_aggregator:
    extract_scheme_details: true
    extract_performance_metrics: true
    extract_user_ratings: false  # Skip user-generated content
    
  regulatory:
    extract_compliance_data: true
    extract_regulatory_codes: true
    extract_risk_factors: true

# Quality assessment
quality_assessment:
  min_completeness_score: 0.6
  min_factual_score: 0.7
  min_text_clarity_score: 0.5
  
  quality_weights:
    completeness: 0.3
    factual_nature: 0.4
    text_clarity: 0.2
    data_richness: 0.1

# Output settings
output:
  save_raw_content: true
  save_processed_content: true
  save_metadata: true
  save_validation_results: true
  
  file_formats:
    - "json"
  
  compression:
    enabled: false
    format: "gzip"

# Monitoring and logging
monitoring:
  enable_metrics: true
  log_scraping_progress: true
  log_validation_failures: true
  log_quality_scores: true
  
  metrics:
    - "scraping_success_rate"
    - "average_response_time"
    - "content_quality_score"
    - "duplicate_detection_rate"

# Security settings
security:
  user_agent_rotation: true
  proxy_rotation: false  # Set to true if using proxies
  respect_robots_txt: true
  
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
    Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8"
    Accept-Language: "en-US,en;q=0.5"
    Accept-Encoding: "gzip, deflate"
    Connection: "keep-alive"

# Error handling
error_handling:
  retry_on_failure: true
  max_retry_attempts: 3
  retry_backoff_factor: 1.5
  
  failure_actions:
    - "log_error"
    - "continue_with_next_url"
    - "send_notification"
  
  notification_settings:
    webhook_url: ""  # Set in environment variables
    email_recipients: []  # Set in environment variables
