name: Data Ingestion Scheduler
on:
  # Run daily at 2:00 AM IST (8:30 PM UTC previous day)
  schedule:
    - cron: '30 20 * * *'
  # Run on manual trigger
  workflow_dispatch:

jobs:
  data-ingestion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
        
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests beautifulsoup4 pandas numpy
          
      - name: Create logs directory
        run: |
          mkdir -p logs
          
      - name: Run data ingestion pipeline
        run: |
          python scripts/run_scheduler_locally.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          
      - name: Upload logs as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: scheduler-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30
          
      - name: Run scheduler health check
        run: |
          python scripts/test_scheduler_simple.py
          
      - name: Run API health check
        run: |
          python -c "
import requests
import sys
try:
    response = requests.get('https://nippon-india-rag-api.onrender.com/api/health', timeout=10)
    if response.status_code == 200:
        print('✅ Production API health check passed')
        sys.exit(0)
    else:
        print('❌ Production API health check failed')
        sys.exit(1)
except Exception as e:
    print(f'❌ Health check error: {e}')
    sys.exit(1)
"
