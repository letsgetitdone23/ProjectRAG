name: Daily Mutual Fund Data Update

on:
  schedule:
    # Trigger at 9:30 AM IST (4:00 AM UTC)
    - cron: '0 4 * * *'
  workflow_dispatch:

# Add necessary permissions for the github-actions bot to push to the repo
permissions:
  contents: write

jobs:
  update-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Required to trigger subsequent workflows if needed, or simply to push
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run web scraping
        env:
          SCRAPE_ALL_SOURCES: "true"
          MAX_RETRIES: "3"
        run: |
          python scripts/scrape_data.py
          
      - name: Process and chunk data
        env:
          CHUNK_STRATEGY: "hybrid"
          MAX_CHUNK_SIZE: "500"
          MIN_CHUNK_SIZE: "200"
        run: |
          python scripts/process_and_chunk.py
          
      - name: Generate BGE embeddings
        env:
          MODEL_NAME: "BAAI/bge-large-en-v1.5"
          BATCH_SIZE: "32"
          UPDATE_VECTOR_STORE: "true"
        run: |
          python generate_bge_embeddings.py
          
      - name: Update SQLite vector store
        env:
          DATABASE_PATH: "./data/vector_store.db"
          COLLECTION_NAME: "mutual-fund-faq-bge"
        run: |
          python scripts/update_sqlite_vector_store.py
          
      - name: Commit and Push Data back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add the generated data and databases
          git add data/ || true
          git add chroma_db/ || true
          git add chroma_db_bge/ || true
          
          # Commit and push only if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: automated daily data and vector store update [skip ci]"
            git push
            echo "Successfully pushed updated data to repository."
          else
            echo "No data changes to commit."
          fi
          
      - name: Upload updated data artifacts (Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updated-data-${{ github.run_number }}
          path: |
            data/
            chroma_db*/
          retention-days: 7
